# Cle fictive pour les tests ? jamais la vraie cle de production
app.master-key=test_master_key_for_ci_only_32chars!

# Base H2 en memoire ? pas besoin de MySQL pour les tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate recree la base e chaque test et la supprime apres
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Secret JWT fictif pour les tests (>= 32 caracteres pour HS256)
app.jwt.secret=test_jwt_secret_for_ci_only_min_32_chars!!
app.jwt.ttl-minutes=60
app.auth.timestamp-window=60
app.auth.nonce-ttl=120
app.auth.token-ttl=15