# Configuration locale (sans Docker)
# Pour overrider en CI / Docker, utiliser des variables d'environnement.

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skillhub_mu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

logging.level.com.projetAuthentification=INFO

# Master Key AES-GCM avec valeur par defaut pour le dev local
app.master-key=${APP_MASTER_KEY:skillhub_master_key_for_demo_minimum_32_chars!}
app.auth.timestamp-window=60
app.auth.nonce-ttl=120
app.auth.token-ttl=15

# JWT secret partage avec Laravel : DOIT etre identique des deux cotes
app.jwt.secret=${JWT_SECRET:skillhub_shared_jwt_secret_between_laravel_and_springboot_2026_demo}
app.jwt.ttl-minutes=60

# Port et endpoint healthcheck
server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
