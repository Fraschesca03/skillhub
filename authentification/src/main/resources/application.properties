spring.datasource.url=jdbc:mysql://mysql:3306/skillhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=skillhub
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

logging.level.com.projetAuthentification=INFO

app.master-key=${APP_MASTER_KEY}
app.auth.timestamp-window=60
app.auth.nonce-ttl=120
app.auth.token-ttl=15

app.jwt.secret=${JWT_SECRET}
app.jwt.ttl-minutes=60

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never